name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: ""
        required: false
        default: ""

permissions:
  contents: write

jobs:
  auto-tag:
    name: Create version tag
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: version tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            NEW_TAG="${{ github.event.inputs.version }}"
          else
            LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
            if [[ -z "$LATEST" ]]; then
              LATEST="v0.0.0"
            fi
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Next tag: ${NEW_TAG}"

      - name: Push tag
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [auto-tag]
    if: |
      always() &&
      (needs.auto-tag.result == 'success' || startsWith(github.ref, 'refs/tags/'))

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            goos: linux
            goarch: amd64
            goarm: ""
          - target: arm64
            goos: linux
            goarch: arm64
            goarm: ""
          - target: armv7
            goos: linux
            goarch: arm
            goarm: "7"
          - target: armv6
            goos: linux
            goarch: arm
            goarm: "6"
          - target: riscv64
            goos: linux
            goarch: riscv64
            goarm: ""
          - target: s390x
            goos: linux
            goarch: s390x
            goarm: ""
          - target: ppc64le
            goos: linux
            goarch: ppc64le
            goarm: ""
          - target: mips64le
            goos: linux
            goarch: mips64le
            goarm: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version tag
        id: version
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ needs.auto-tag.outputs.new_tag }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${TAG}"

      - name: Build binary
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X 'github.com/cryruss/cryruss.Version=${TAG}'" \
            -o "cryruss-${{ matrix.target }}" \
            ./cmd/cryruss

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryruss-${{ matrix.target }}
          path: cryruss-${{ matrix.target }}
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [auto-tag, build]
    if: |
      always() &&
      needs.build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: version
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ needs.auto-tag.outputs.new_tag }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Build changelog from commits
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname \
            | grep -v "^${TAG}$" | head -1)
          if [[ -z "$PREV_TAG" ]]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          BODY=$(git log "$RANGE" \
            --pretty=format:"- %s (%h)" \
            --no-merges \
            | head -50)
          if [[ -z "$BODY" ]]; then
            BODY="_No notable changes._"
          fi
          EOF_MARKER=$(openssl rand -hex 8)
          {
            echo "body<<${EOF_MARKER}"
            echo "## What's Changed"
            echo ""
            echo "$BODY"
            echo ""
            echo "---"
            echo "**Full changelog:** \`${PREV_TAG:-initial}..${TAG}\`"
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "cryruss ${{ steps.version.outputs.tag }}"
          body:       ${{ steps.changelog.outputs.body }}
          draft:      false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: artifacts/cryruss-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
